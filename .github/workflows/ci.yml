name: CI

# push は main のみ。PR ブランチへの push で二重に回さないため。
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # requires-python の下限と、現行の新しめの安定版で挟む
        python-version: ["3.10", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          # 依存が変わったらキャッシュが失効するようにする
          cache-dependency-path: pyproject.toml

      # Parquet 往復テストに io extra が要る
      - name: Install
        run: pip install -e ".[dev,io]"

      - name: Run tests
        run: pytest

      # 生成物は手で書かない。コードから再生成して差分ゼロを検証する (CLAUDE.md §1.3)
      - name: Check committed JSON Schema is up to date
        run: python scripts/export_jsonschema.py --check

  dependency-discipline:
    # ランタイム依存は pydantic のみ (CLAUDE.md §1.1)。io extra を入れない環境で
    # core 本体が完全に読み込めることを確認する。Python 版に依らないので 1 版のみ。
    name: dependency discipline (no io extra)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install without io extra
        run: pip install -e ".[dev]"

      - name: Import every non-io module without pyarrow
        run: python scripts/check_dependencies.py
